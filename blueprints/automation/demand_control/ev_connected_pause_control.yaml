blueprint:
  name: Demand Control - Pause control when EV disconnected
  description: |
    Automatically pauses (turns OFF) the Demand Control switch when the EV is not
    connected to the charger, and optionally resumes it when the EV connects again.

    Works with binary_sensor, input_boolean, and plain sensors (e.g. a charger
    status sensor that reports "connected" / "disconnected"). Configure the
    "connected value" and "disconnected value" inputs to match what your sensor
    actually reports as its state.
  domain: automation
  input:
    ev_connected_entity:
      name: EV Connected sensor
      description: >
        Entity that reflects whether the EV is connected. Can be a binary_sensor
        or input_boolean (uses on/off by default) or any sensor with custom state
        values configured below.
      selector:
        entity:
          domain:
            - binary_sensor
            - input_boolean
            - sensor
    connected_value:
      name: Connected state value
      description: >
        The state value that means the EV IS connected. Default "on" works for
        binary_sensor and input_boolean. For a charger sensor use the exact string
        it reports, e.g. "connected" or "charging".
      default: "on"
      selector:
        text:
    disconnected_value:
      name: Disconnected state value
      description: >
        The state value that means the EV is NOT connected. Default "off" works
        for binary_sensor and input_boolean. For a charger sensor use the exact
        string it reports, e.g. "disconnected" or "unavailable".
      default: "off"
      selector:
        text:
    demand_control_switch:
      name: Demand Control switch
      description: >
        The "EV Charge Control" switch entity created by the Demand Control
        integration (switch.demand_control_ev_charge_control or similar).
      selector:
        entity:
          domain: switch
    resume_on_connect:
      name: Resume control when EV connects
      description: >
        When enabled, the Demand Control switch will be turned back ON automatically
        as soon as the EV connects again.
      default: true
      selector:
        boolean:

mode: single
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input ev_connected_entity
    to: !input disconnected_value
    id: ev_disconnected
  - platform: state
    entity_id: !input ev_connected_entity
    to: !input connected_value
    id: ev_connected

variables:
  resume_on_connect: !input resume_on_connect

action:
  - choose:
      - conditions:
          - condition: trigger
            id: ev_disconnected
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input demand_control_switch
      - conditions:
          - condition: trigger
            id: ev_connected
          - condition: template
            value_template: "{{ resume_on_connect }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input demand_control_switch
